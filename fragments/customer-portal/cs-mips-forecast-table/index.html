<div class="cs-mips-forecast">
  <div class="mips-header">
    <h2 class="mips-title" data-lfr-editable-id="mips-title" data-lfr-editable-type="text">16-Week Rolling Forecast & Release</h2>
    <p class="mips-subtitle" data-lfr-editable-id="mips-subtitle" data-lfr-editable-type="text">
      Please enter your forecast quantities. The first two weeks are locked from changes. Weekly releases must be submitted for locked periods.
    </p>
  </div>

  <div class="mips-table-container">
    <div class="mips-loader" id="mips-loader" style="display: none;"><div class="mips-spinner"></div></div>
    <table class="mips-table" id="mips-dynamic-table" style="opacity: 0; transition: opacity 0.3s ease;">
      <thead>
        <tr id="mips-header-row">
          <th class="mips-th-sticky">Metric</th>
          <!-- Headers generated by JS -->
        </tr>
      </thead>
      <tbody id="mips-body">
        <!-- Forecast Row -->
        <tr id="mips-forecast-row">
          <td class="mips-td-sticky metric-label">
            <strong>Forecast Qty</strong>
            <span class="metric-sub">(Lbs)</span>
          </td>
          <!-- Cells generated by JS -->
        </tr>
        
        <!-- Release Row -->
        <tr id="mips-release-row">
          <td class="mips-td-sticky metric-label">
            <strong>Release Qty</strong>
            <span class="metric-sub">(Lbs)</span>
          </td>
          <!-- Cells generated by JS -->
        </tr>
      </tbody>
    </table>
  </div>

  <div class="mips-footer">
    <div class="mips-validation-message" id="mips-msg" style="display: none;"></div>
    <div class="mips-actions">
      <button class="mips-btn mips-btn-secondary" id="mips-save-draft">Save Draft</button>
      <button class="mips-btn mips-btn-primary" id="mips-submit-btn">Submit Forecast &amp; Release</button>
    </div>
  </div>
</div>
