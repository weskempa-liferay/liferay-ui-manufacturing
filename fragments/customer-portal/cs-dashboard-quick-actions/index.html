<div class="cs-dash-actions">

  <div class="actions-grid">

    <div class="action-tile" data-lfr-editable-id="action-tile-1-link" data-lfr-editable-type="link">
      <a href="#" class="action-tile-inner">
        <div class="action-icon action-icon-upload">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    </div>

    <!-- Quick Re-Order -->
    <div class="action-tile" data-lfr-editable-id="action-tile-2-link" data-lfr-editable-type="link">
      <a href="#" class="action-tile-inner">
        <div class="action-icon action-icon-reorder">

    <div class="action-tile" data-lfr-editable-id="action-tile-3-link" data-lfr-editable-type="link">
      <a href="#" class="action-tile-inner">

            <path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Weekly Release -->
    <div class="action-tile" data-lfr-editable-id="action-tile-4-link" data-lfr-editable-type="link">
      <a href="#" class="action-tile-inner">
        <div class="action-icon action-icon-release">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <div class="action-tile" data-lfr-editable-id="action-tile-5-link" data-lfr-editable-type="link">
      <a href="#" class="action-tile-inner">
        <div class="action-icon action-icon-schedule">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
