<div class="cs-capacity-heatmap">
  <div class="hm-header">
    <h3 class="hm-title" data-lfr-editable-id="hm-title" data-lfr-editable-type="text">External consumers % Full</h3>
  </div>

  <div class="hm-grid-container">
    <div class="hm-grid-header">
      <div class="hm-col-week">Week</div>
      <div class="hm-col-facility">${configuration.facilityName!"Saukville"}</div>
    </div>
    
    <div class="hm-grid-body" id="hm-grid-body">
      <div class="hm-loader" id="hm-loader"><div class="hm-spinner"></div></div>
    </div>
  </div>

  <div class="hm-legend" id="hm-legend">
    <div class="hm-legend-item" data-tier="closed">
      <div class="hm-color-box bg-closed"></div>
      <span class="hm-legend-label">Closed</span>
    </div>
    <div class="hm-legend-item" data-tier="urgent">
      <div class="hm-color-box bg-urgent"></div>
      <span class="hm-legend-label">85-99.9% <span class="text-muted">(urgent)</span></span>
    </div>
    <div class="hm-legend-item" data-tier="ok">
      <div class="hm-color-box bg-ok"></div>
      <span class="hm-legend-label">70-84.9% <span class="text-muted">(still ok)</span></span>
    </div>
    <div class="hm-legend-item" data-tier="open">
      <div class="hm-color-box bg-open"></div>
      <span class="hm-legend-label">&lt; 70% <span class="text-muted">(wide open)</span></span>
    </div>
  </div>

  <!-- Custom Tooltip -->
  <div class="hm-tooltip" id="hm-tooltip" style="display: none;"></div>
</div>
