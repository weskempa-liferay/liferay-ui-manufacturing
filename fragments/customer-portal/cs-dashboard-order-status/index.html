<div class="cs-dash-orders">
  <div class="orders-header">
    <div class="orders-title-row">
      <h2 class="orders-title" data-lfr-editable-id="orders-title" data-lfr-editable-type="text">Recent Orders</h2>
      <div class="orders-actions-row">
        <a href="/web/customer-portal/orders" class="orders-view-all">View All Orders</a>
      </div>
    </div>
    <div class="orders-filter-tabs">
      <button class="filter-tab active" data-filter="all">All</button>
      <button class="filter-tab" data-filter="tracking">Tracking</button>
      <button class="filter-tab" data-filter="partial ready">Partial Ready</button>
      <button class="filter-tab" data-filter="ready">Ready</button>
    </div>
  </div>

  <div class="orders-table-wrapper">
    <table class="orders-table">
      <thead>
        <tr>
          <th>Sales Order</th>
          <th>PO #</th>
          <th>Item Description</th>
          <th>Grade</th>
          <th>Status</th>
          <th>Roll Week</th>
          <th>Due Date</th>
        </tr>
      </thead>
      <tbody class="orders-tbody" id="orders-dynamic-tbody">
      </tbody>
    </table>
    <div class="orders-loader" id="orders-loader" style="display: none;">
      <div class="orders-spinner"></div>
    </div>
  </div>
  
  <div class="orders-pagination" id="orders-pagination" style="display: none;">
    <span class="pagination-info" id="pagination-info">Showing 1-10 of 50</span>
    <div class="pagination-controls">
      <button class="mips-btn mips-btn-secondary" id="btn-prev-page" disabled>Previous</button>
      <button class="mips-btn mips-btn-secondary" id="btn-next-page">Next</button>
    </div>
  </div>
</div>
