<div class="cs-dash-orders">
  <div class="orders-header">
    <div class="orders-title-row">
      <h2 class="orders-title" data-lfr-editable-id="orders-title" data-lfr-editable-type="text">Recent Orders</h2>
      <div class="orders-actions-row">
        <a data-lfr-editable-id="orders-view-all-link" data-lfr-editable-type="link"><a href="/web/customer-portal/orders" class="orders-view-all">View All Orders</a></a>
      </div>
    </div>
    <div class="orders-filter-tabs">
      <button class="filter-tab active" data-filter="all">All</button>
      <button class="filter-tab" data-filter="coil">Coil</button>
      <button class="filter-tab" data-filter="sbq-bar">SBQ-BAR</button>
    </div>
  </div>

  <div class="orders-table-wrapper">
    <table class="orders-table">
      <thead>
        <tr>
          <th>Sales Order</th>
          <th>PO #</th>
          <th>Item Description</th>
          <th>Grade</th>
          <th>Status</th>
          <th>Roll Week</th>
          <th>Due Date</th>
        </tr>
      </thead>
      <tbody class="orders-tbody" id="orders-dynamic-tbody">
      </tbody>
    </table>
    <div class="orders-loader" id="orders-loader" style="display: none;"><div class="orders-spinner"></div></div>
    </table>
  </div>
</div>
