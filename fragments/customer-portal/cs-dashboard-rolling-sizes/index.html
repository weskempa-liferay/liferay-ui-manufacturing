<div class="cs-rolling-sizes">
  <div class="rs-header">
    <div class="rs-title-area">
      <h2 class="rs-title" data-lfr-editable-id="rs-title" data-lfr-editable-type="text">Rolling Sizes Matrix</h2>
      <p class="rs-subtitle" data-lfr-editable-id="rs-subtitle" data-lfr-editable-type="text">
        16-week production schedule for specific product sizes.
      </p>
    </div>
    
    <div class="rs-filter-area">
      <div class="rs-search-wrapper">
        <svg class="rs-search-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="currentColor"/>
        </svg>
        <input type="text" id="rs-size-filter" class="rs-search-input" placeholder="Filter by size (e.g. 1/2, 45/64)..." aria-label="Filter sizes" />
      </div>
    </div>
  </div>

  <div class="rs-timeline-wrapper">
    <!-- The timeline header row -->
    <div class="rs-timeline" id="rs-timeline-container">
      <div class="rs-loader" id="rs-loader"><div class="rs-spinner"></div></div>
    </div>
  </div>

  <div class="rs-detail-panel" id="rs-detail-panel" style="display: none;">
    <div class="rs-detail-header">
      <h3 class="rs-detail-title" id="rs-detail-title">Week of May 31, 2026</h3>
      <button class="rs-close-btn" id="rs-close-btn" aria-label="Close details">&times;</button>
    </div>
    <div class="rs-detail-content" id="rs-detail-content">
      <!-- Generated by JS -->
    </div>
  </div>
</div>
